name: Build Unsigned IPA (iOS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build Unsigned iOS IPA
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add iOS platform
        run: npx cap add ios 2>/dev/null || echo "iOS platform already exists"

      - name: Sync Capacitor to iOS
        run: npx cap sync ios

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install --repo-update

      - name: Build iOS archive (unsigned)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "wasafi.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" | xcpretty

      - name: Package IPA from archive
        run: |
          mkdir -p build/Payload
          cp -r wasafi.xcarchive/Products/Applications/App.app build/Payload/
          cd build
          zip -r WasafiPremium-Unsigned.ipa Payload/

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: WasafiPremium-Unsigned-IPA
          path: build/WasafiPremium-Unsigned.ipa
          retention-days: 30
